<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>局域网视频通话</title>
    <style>
        body { font-family: Arial; max-width: 1000px; margin: 20px auto; background:#1a1a1a; color: white; }
        .video-box { display: flex; gap: 20px; margin-top: 20px; flex-wrap:wrap; justify-content:center; }
        video { width: 450px; height: 350px; border: 2px solid #0078d7; border-radius: 8px; background: #000; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; background: #0078d7; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #666; cursor: not-allowed; }
        #status { font-size: 18px; margin-top: 20px; color: #4caf50; text-align:center; }
        #hangupBtn { background: #d32f2f; }
    </style>
</head>
<body>
    <h1 style="text-align:center">📡 局域网视频通话</h1>
    <div style="text-align:center">
        <button id="startBtn">开启摄像头</button>
        <button id="callBtn" disabled>发起通话</button>
        <button id="hangupBtn" disabled>挂断</button>
    </div>
    <div class="video-box">
        <div>
            <h3>本地</h3>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
            <h3>对方</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>
    <div id="status">等待开启摄像头...</div>

    <script>
        let localStream;
        let peerConn;
        let ws;

        const ICE_CONFIG = {
            iceServers: [
                { urls: "stun:stun.qq.com:3478" },
                { urls: "stun:stun.miwifi.com:3478" }
            ]
        };

        document.getElementById('startBtn').onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
                document.getElementById('localVideo').srcObject = localStream;

                // ======================
                const wsUrl = "wss://" + window.location.host;
                console.log("WebSocket 地址：", wsUrl);
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    document.getElementById('status').textContent = "✅ 连接成功，可以通话";
                    document.getElementById('callBtn').disabled = false;
                    document.getElementById('startBtn').disabled = true;
                };
                ws.onmessage = handleSignaling;
                ws.onerror = (e) => {
                    document.getElementById('status').textContent = "❌ WebSocket 连接失败";
                    document.getElementById('status').style.color = "red";
                };
            } catch (e) {
                document.getElementById('status').textContent = "❌ 摄像头失败: " + e.message;
                document.getElementById('status').style.color = "red";
            }
        };

        document.getElementById('callBtn').onclick = async () => {
            peerConn = new RTCPeerConnection(ICE_CONFIG);
            localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));

            peerConn.ontrack = e => {
                document.getElementById('remoteVideo').srcObject = e.streams[0];
                document.getElementById('status').textContent = "✅ 通话中";
            };

            peerConn.onicecandidate = e => {
                if(e.candidate) ws.send(JSON.stringify({ type:"ice", data:e.candidate }));
            };

            let offer = await peerConn.createOffer();
            await peerConn.setLocalDescription(offer);
            ws.send(JSON.stringify({ type:"offer", data:offer }));

            document.getElementById('callBtn').disabled = true;
            document.getElementById('hangupBtn').disabled = false;
        };

        document.getElementById('hangupBtn').onclick = () => {
            if(peerConn) peerConn.close();
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('status').textContent = "✅ 已挂断";
            document.getElementById('callBtn').disabled = false;
            document.getElementById('hangupBtn').disabled = true;
        };

        async function handleSignaling(msg) {
            let data = JSON.parse(msg.data);
            if(!peerConn) {
                peerConn = new RTCPeerConnection(ICE_CONFIG);
                localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));

                peerConn.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];

                peerConn.onicecandidate = e => {
                    if(e.candidate) ws.send(JSON.stringify({ type:"ice", data:e.candidate }));
                };
            }

            if(data.type === "offer") {
                await peerConn.setRemoteDescription(data.data);
                let ans = await peerConn.createAnswer();
                await peerConn.setLocalDescription(ans);
                ws.send(JSON.stringify({ type:"answer", data:ans }));
            } else if(data.type === "answer") {
                await peerConn.setRemoteDescription(data.data);
            } else if(data.type === "ice") {
                await peerConn.addIceCandidate(data.data);
            }
        }
    </script>
</body>
</html>
